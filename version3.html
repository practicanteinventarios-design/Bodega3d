<html lang="es">

<head>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://jsuites.net/v4/jsuites.js"></script>
  <link rel="stylesheet" href="https://jsuites.net/v4/jsuites.css" type="text/css" />
  <script src="https://bossanova.uk/jspreadsheet/v4/jexcel.js"></script>
  <link rel="stylesheet" href="https://bossanova.uk/jspreadsheet/v4/jexcel.css" type="text/css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VisualRack</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {

      /* ─── COLORES PRINCIPALES ─── */
      --bg: #07111f;
      --bg-secondary: #0b1c33;

      --surface: rgba(10, 25, 47, 0.88);
      --surface-light: rgba(255, 255, 255, 0.04);

      --primary: #d8ff3e;
      --primary-soft: rgba(216, 255, 62, 0.15);

      --border: rgba(216, 255, 62, 0.22);
      --border-strong: rgba(216, 255, 62, 0.5);

      --text: #ffffff;
      --text-muted: #9fb3d1;

      --shadow: 0 15px 40px rgba(0, 0, 0, 0.45);
      --blur: blur(18px);

      --radius: 18px;
      --transition: 0.25s ease;

    }

    /* ───────────────────────────── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      color: white;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, #12345c 0%, transparent 30%),
        radial-gradient(circle at bottom right, #1d3152 0%, transparent 35%),
        linear-gradient(135deg, #050c16, #07111f, #08182e);
      color: var(--text);
    }

    /* HEADER */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      z-index: 100;
      background: rgba(5, 12, 22, 0.65);
      backdrop-filter: var(--blur);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    header a {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--primary);
      text-transform: uppercase;
    }

    /* SIDEBAR */
    .Sidebar {
      position: fixed;
      top: 0;
      right: -280px;
      width: 280px;
      height: 100vh;
      z-index: 999;
      transition: 0.4s cubic-bezier(.77, 0, .18, 1);
      background: rgba(6, 14, 25, 0.55);
      backdrop-filter: blur(22px);
      border-left: 1px solid rgba(255, 255, 255, 0.05);
    }

    .Sidebar.active {
      right: 0;
    }

    .Sidebar_Info {
      width: 100%;
      height: 100%;
      padding: 95px 24px 24px 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* BLOQUES */
    .Sidebar_Info>div {
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      transition: var(--transition);
    }

    .Sidebar_Info>div:hover {
      transform: translateY(-2px);
      border-color: var(--border);
    }

    /* TITULOS */
    .Contenedor_Busqueda h5 {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
      color: var(--primary);
      font-weight: 600;
    }

    /* INPUTS */
    .Sidebar_Info input,
    .Sidebar_Info select {
      width: 100%;
      border: none;
      outline: none;
      padding: 14px 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid transparent;
      color: var(--text);
      font-size: 14px;
      transition: var(--transition);
    }

    .Sidebar_Info input::placeholder {
      color: #ffffff;
    }

    .Sidebar_Info input:focus,
    .Sidebar_Info select:focus {
      border-color: var(--border-strong);
      background: rgb(4, 31, 82);
      box-shadow: 0 0 0 4px rgba(216, 255, 62, 0.08);
    }

    /* BOTONES */

    .btn {
      width: 100%;
      border: none;
      padding: 14px 18px;
      border-radius: 14px;
      background: linear-gradient(135deg, #d8ff3e, #b5ff00);
      color: #07111f;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: 0.25s ease;
      box-shadow: 0 10px 25px rgba(181, 255, 0, 0.2);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(181, 255, 0, 0.35);
    }

    /* BTN DESPLAZAR */
    .DesplazarBtn {
      position: fixed;
      top: 50%;
      right: 0;
      transform: translateY(-50%);
      width: 52px;
      height: 120px;
      border-radius: 18px 0 0 18px;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(5, 12, 22, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      color: var(--primary);
      font-size: 22px;
    }

    .DesplazarBtn:hover {
      width: 60px;
    }

    .DesplazarBtn .arrow-icon {
      transition: 0.35s ease;
    }

    .Sidebar.active~.DesplazarBtn .arrow-icon {
      transform: rotate(180deg);
    }

    /* PANTALLA INICIO */

    .Pantalla_inicio {
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(5, 12, 22, 0.72), rgba(5, 12, 22, 0.82));
      backdrop-filter: blur(8px);
      z-index: 1000;
    }

    .Pantalla_inicio img {
      width: 440px;
      position: absolute;
      left: 54%;
      top: 38%;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 0 40px rgba(216, 255, 62, 0.12));
    }

    .Comenzamosbtn {
      position: absolute;
      left: 50%;
      top: 58%;
      width: auto;
      padding: 16px 45px;
      border-radius: 18px;
      font-size: 13px;
    }

    /* BTN RACKS */

    .Racks {
      position: fixed;
      bottom: 25px;
      left: 25px;
      width: 62px;
      height: 62px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      z-index: 100;
      background: rgba(5, 12, 22, 0.85);
      color: var(--primary);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      transition: 0.25s ease;
    }

    .Racks:hover {
      transform: translateY(-4px) scale(1.05);
      background: var(--primary);
      color: #07111f;
    }

    /* MODAL */
    .modal {
      position: fixed;
      top: 50%;
      left: 40%;
      transform: translate(-50%, -50%);
      width: 72%;
      height: 82vh;
      display: none;
      flex-direction: column;
      z-index: 1200;
      overflow: hidden;
      border-radius: 28px;
      background: rgba(5, 12, 22, 0.92);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.65);
    }

    /* TABLA */
    .tablacontainer {
      width: 100%;
      height: 100%;
      overflow: auto;
      margin-top: 70px;
      margin-bottom: 50px;
    }

    .modal table {
      width: 100%;
      border-collapse: collapse;
    }

    .modal table th {
      position: sticky;
      top: 0;
      padding: 16px;
      background: #0b1c33;
      color: var(--primary);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      z-index: 2;
    }

    .modal table td {
      padding: 14px 16px;
      font-size: 13px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      color: #dfe9f8;
    }

    .modal table tr {
      transition: 0.2s ease;
    }

    .modal table tr:hover {
      background: rgba(216, 255, 62, 0.06);
    }

    /* CERRAR */
    .icon_x {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      cursor: pointer;
      transition: 0.25s ease;
      font-size: 14px;
      font-weight: 700;
    }

    .icon_x:hover {
      transform: rotate(90deg) scale(1.08);
      background: var(--primary);
      color: #07111f;
    }

    /* SCROLL */
    ::-webkit-scrollbar {
      width: 7px;
      height: 7px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(216, 255, 62, 0.5);
      border-radius: 20px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary);
    }



    #listaSeriales {
      width: 100%;
      max-height: 220px;
      overflow-y: auto;
      margin-top: 8px;
      padding: 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .itemSerial {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    .itemSerial:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .itemSerial input {
      cursor: pointer;
    }

    .itemSerial span {
      font-size: 12px;
      color: white;

      word-break: break-word;
    }
  </style>
  <style>
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 1000;
      opacity: 0.3;
      transition: opacity 0.2s;
    }

    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 1px;
    }

    #crosshair::before {
      width: 2px;
      height: 18px;
      top: -9px;
      left: -1px;
    }

    #crosshair::after {
      width: 18px;
      height: 2px;
      top: -1px;
      left: -9px;
    }

    #toggleModo {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1001;
      background: rgba(10, 25, 47, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font: 13px/1 'Inter', sans-serif;
      padding: 8px 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    #toggleModo:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    @media (max-width: 900px) {
      header {
        padding: 0 16px;
        height: 56px;
      }

      header a {
        font-size: 17px;
      }

      .Sidebar {
        width: 100%;
        right: -100%;
      }

      .Sidebar_Info {
        padding: 72px 14px 14px;
        gap: 10px;
      }

      .Sidebar_Info>div {
        padding: 12px;
      }

      .Pantalla_inicio img {
        width: min(75vw, 280px);
        top: 35%;
      }

      .Comenzamosbtn {
        top: 52%;
        padding: 14px 32px;
        width: auto;
      }

      .modal {
        width: 94%;
        left: 50%;
        height: 85vh;
      }

      .tablacontainer {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      .modal table th,
      .modal table td {
        padding: 10px 8px;
        font-size: 12px;
        white-space: nowrap;
      }

      a {
        color: white;
      }

      .DesplazarBtn {
        width: 40px;
        height: 70px;
        font-size: 16px;
      }

      #toggleModo {
        bottom: 12px;
        right: 12px;
        padding: 8px 14px;
        font-size: 12px;
      }

      .Racks {
        width: 48px;
        height: 48px;
        bottom: 14px;
        left: 14px;
        font-size: 16px;
      }

      .icon_x {
        width: 38px;
        height: 38px;
        top: 12px;
        right: 12px;
      }
    }

    @media (max-width: 480px) {

      html,
      body {
        touch-action: manipulation;
      }

      .Pantalla_inicio img {
        width: min(70vw, 200px);
        top: 32%;
      }

      .Comenzamosbtn {
        top: 48%;
        font-size: 12px;
        padding: 12px 28px;
      }

      .Sidebar_Info input,
      .Sidebar_Info select {
        padding: 10px 10px;
        font-size: 13px;
        min-height: 44px;
      }

      .Sidebar_Info h5 {
        font-size: 10px;
      }

      .btn {
        padding: 12px 14px;
        font-size: 12px;
      }

      #toggleModo {
        bottom: 8px;
        right: 8px;
        padding: 6px 10px;
        font-size: 11px;
      }

      .DesplazarBtn {
        width: 34px;
        height: 60px;
        font-size: 13px;
      }

      .Racks {
        width: 40px;
        height: 40px;
        bottom: 10px;
        left: 10px;
        font-size: 14px;
      }

      .modal table th,
      .modal table td {
        padding: 8px 6px;
        font-size: 11px;
      }
    }

    tfoot {
      background: #00336600;
      width: 100%;
      height: 40px;
      bottom: 10px;
      position: absolute;
      display: flex;
      justify-content: flex-end;
    }
  </style>
</head>

<body>
  <div id="crosshair"></div>
  <header class="Header">
    <a href="#">SCANVENTORY</a>
    <button id="toggleModo">🔄 Orbita</button>
  </header>
  <div class="Sidebar">
    <div class="Sidebar_Info">
      <div class="Contenedor_Busqueda">
        <h5>Ubicacion a consultar</h5>
        <input id="input" name="UbicacionBuscador" placeholder="Ubicacion" type="text">
      </div>
      <div class="Contenedor_Busqueda">
        <h5>Ubicaciones especiales</h5>
        <select name="Categorias" id="Categorias_Art">
          <option value="">Selecciona Ubicacion</option>
        </select>
      </div>
      <div class="Contenedor_Busqueda">
        <h5>Almacenamiento</h5>
        <select name="CategoriasUbicaciones" id="Categorias_Ubic">
          <option value="">Selecciona Almacenamiento</option>
        </select>
      </div>
      <div class="Contenedor_Busqueda Serial_contenedor">
        <h5>Serial</h5>
        <input id="inputSerial" placeholder="Ingrese serial" type="text">
        <div id="listaSeriales" style="display: none;"></div>
      </div>
      <div class="Contenedor_Busqueda Serial_contenedor">
        <h5>Nombre</h5>
        <input id="inputNombre" placeholder="Ingrese Nombre" type="text">
        <div id="listaNombres"></div>
      </div>
      <div>
        <button id="btnmodal" class="btn btnmodal">Ver resultados</button>
      </div>
    </div>
  </div>
  <button id="DesplazarBtn" class="DesplazarBtn btn"><span class="arrow-icon">⭠</span></button>
  <div id="Pantalla_inicio" class="Pantalla_inicio">
    <img src="https://i.ibb.co/kgvGYtR2/op9.png" alt="op9" border="0">
    <button id="Comenzamosbtn" class="Comenzamosbtn btn">Comenzamos</button>
  </div>
  <div id="modal" class="modal">
    <div id="icon_x" class="icon_x">X</div>
    <div class="tablacontainer">
      <table id="table" class="table">
      </table>
    </div>
  </div>
  <script type="importmap">
    {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
  </script>

  <script type="module">
    function abrirSidebar() {
      document.querySelector(".Sidebar").classList.add("active");
    }
    function cerrarSidebar() {
      document.querySelector(".Sidebar").classList.remove("active");
    }
    // Desplazar slider
    const btn = document.getElementById("DesplazarBtn");
    const sidebar = document.querySelector(".Sidebar");

    btn.addEventListener('click', function () {
      if (sidebar.classList.contains("active")) {
        cerrarSidebar();
      } else {
        abrirSidebar();
      }
    });

    //Modal
    const modal = document.getElementById('modal');
    const btnmodal = document.getElementById('btnmodal');
    const icon_x = document.getElementById('icon_x');

    btnmodal.addEventListener('click', function () {
      const estado = window.getComputedStyle(modal).display;
      modal.style.display = estado === "none" ? "flex" : "none";
    });

    icon_x.addEventListener('click', function () {
      modal.style.display = "none";
    });

    // Cerrar modal al hacer clic fuera de la tabla
    modal.addEventListener('click', function (e) {
      if (e.target === modal) modal.style.display = "none";
    });

    // Boton de inicio
    const Comenzamosbtn = document.getElementById("Comenzamosbtn");
    const Pantalla_inicio = document.getElementById("Pantalla_inicio");

    Comenzamosbtn.addEventListener('click', function () {
      Pantalla_inicio.style.display = "none";
      if (modoFPS) renderer.domElement.requestPointerLock();
    });



    //Aqui comienza el codigo del three js

    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { mergeGeometries } from "three/addons/utils/BufferGeometryUtils.js";
    import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
    import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
    import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";


    // ESCENA
    const escena = new THREE.Scene();
    const colorAmbiente = 0x1a1817;
    escena.background = new THREE.Color(colorAmbiente);
    escena.fog = new THREE.Fog(colorAmbiente, 25, 65);

    // CAMARA
    const camara = new THREE.PerspectiveCamera(
      62,
      window.innerWidth / window.innerHeight,
      0.1,
      1000,
    );

    // RENDER
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(
      Math.min(window.devicePixelRatio, 1.5)
    );
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.5;
    document.body.appendChild(renderer.domElement);

    // ─── POST-PROCESSING (BLOOM) ───
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(escena, camara));
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      0.6, 0.4, 2.0
    );
    let bloomActivo = true;
    let fpsContador = 0, fpsTiempo = 0, contadorPolvo = 0;
    composer.addPass(bloomPass);

    // ─── PARTÍCULAS DE POLVO (sin actualización por frame) ───
    const dustCount = 250;
    const dustGeo = new THREE.BufferGeometry();
    const dustPos = new Float32Array(dustCount * 3);
    const dustBaseY = new Float32Array(dustCount);
    const dustOff = new Float32Array(dustCount);
    for (let i = 0; i < dustCount; i++) {
      dustPos[i * 3] = (Math.random() - 0.5) * 80;
      dustPos[i * 3 + 1] = (Math.random() - 0.5) * 8 + 3;
      dustPos[i * 3 + 2] = (Math.random() - 0.5) * 60 - 10;
      dustBaseY[i] = dustPos[i * 3 + 1];
      dustOff[i] = Math.random() * Math.PI * 2;
    }
    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
    const dustMat = new THREE.PointsMaterial({
      color: 0xffeedd, size: 0.03, transparent: true, opacity: 0.18,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const dustParticles = new THREE.Points(dustGeo, dustMat);
    escena.add(dustParticles);

    // ─── POSICIÓN INICIAL DE CADA MODO (edítalos aquí) ───
    const POS_FPS = { x: 5, y: 1, z: -11, pitch: -0.1, yaw: 0 };
    const POS_ORBITA = { x: 0, y: 0, z: 0, targetX: 40, targetY: 10, targetZ: -1 };

    // ─── MODO (FPS / Orbita) ───
    let modoFPS = false;

    // ─── ORBIT CONTROLS (siempre listos, se habilitan/deshabilitan) ───
    const orbitControls = new OrbitControls(camara, renderer.domElement);
    orbitControls.enableDamping = true;
    orbitControls.dampingFactor = 0.08;
    orbitControls.enablePan = true;
    orbitControls.panSpeed = 2.2;
    orbitControls.rotateSpeed = 1.4;
    orbitControls.zoomSpeed = 5;
    orbitControls.screenSpacePanning = true;
    orbitControls.target.set(POS_ORBITA.targetX, POS_ORBITA.targetY, POS_ORBITA.targetZ);
    orbitControls.minDistance = 1;
    orbitControls.maxDistance = 180;
    orbitControls.maxPolarAngle = Math.PI * 0.49;
    orbitControls.enabled = true;

    // ─── FPS CONTROLS ───
    const euler = new THREE.Euler(POS_FPS.pitch, POS_FPS.yaw, 0, 'YXZ');
    camara.position.set(POS_FPS.x, POS_FPS.y, POS_FPS.z);
    camara.quaternion.setFromEuler(euler);
    const direccion = new THREE.Vector3();
    const teclas = {};
    let bloqueado = false, recienBloqueado = false, arrastrando = false, ultimoX = 0, ultimoY = 0;
    let controlActivo = false;
    const reloj = new THREE.Clock();
    const crosshair = document.getElementById('crosshair');
    crosshair.style.opacity = '0';

    const estadoFPS = { pos: new THREE.Vector3(POS_FPS.x, POS_FPS.y, POS_FPS.z), euler: new THREE.Euler(POS_FPS.pitch, POS_FPS.yaw, 0, 'YXZ') };
    const estadoOrbita = { pos: new THREE.Vector3(POS_ORBITA.x, POS_ORBITA.y, POS_ORBITA.z), target: new THREE.Vector3(POS_ORBITA.targetX, POS_ORBITA.targetY, POS_ORBITA.targetZ) };

    function toggleModo() {
      modoFPS = !modoFPS;
      const btn = document.getElementById('toggleModo');
      if (modoFPS) {
        // Guardar estado de órbita
        estadoOrbita.pos.copy(camara.position);
        estadoOrbita.target.copy(orbitControls.target);
        if (document.pointerLockElement) document.exitPointerLock();
        orbitControls.enabled = false;
        bloqueado = false; arrastrando = false; controlActivo = true;
        camara.position.copy(estadoFPS.pos);
        euler.copy(estadoFPS.euler);
        camara.quaternion.setFromEuler(euler);
        crosshair.style.opacity = '1';
        btn.textContent = '🎮 FPS';
      } else {
        // Guardar estado de FPS
        estadoFPS.pos.copy(camara.position);
        estadoFPS.euler.copy(euler);
        if (document.pointerLockElement) document.exitPointerLock();
        orbitControls.enabled = true;
        bloqueado = false; controlActivo = false;
        crosshair.style.opacity = '0';
        btn.textContent = '🔄 Orbita';
        camara.position.copy(estadoOrbita.pos);
        orbitControls.target.copy(estadoOrbita.target);
      }

      euler.y -= dx * 0.002;

      const dx = x - joystickCentro.x;
      const dy = y - joystickCentro.y;
      teclas['w'] = dy < -umbralJoystick;
      teclas['s'] = dy > umbralJoystick;
      teclas['a'] = dx < -umbralJoystick;

    function createConcreteTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 512;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#888980";
      ctx.fillRect(0, 0, 512, 512);

      for (let i = 0; i < 2400; i++) {
        const gray = 90 + Math.floor(Math.random() * 70);
        const alpha = 0.03 + Math.random() * 0.05;
        ctx.fillStyle = `rgba(${gray}, ${gray}, ${gray}, ${alpha})`;
        ctx.beginPath();
        ctx.arc(
          Math.random() * 512,
          Math.random() * 512,
          Math.random() * 2.3,
          0,
          Math.PI * 2,
        );
        ctx.fill();
      }

      ctx.strokeStyle = "rgba(255,255,255,0.05)";
      ctx.lineWidth = 2;
      for (let i = 0; i <= 512; i += 64) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, 512);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(512, i);
        ctx.stroke();
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(8, 8);
      return texture;
    }

    function crearEscaleraMetalica(x, z, alturaObjetivo, anchoEscalon = 1.15, roty) {
      const grupoEscalera = new THREE.Group();
      const contrahuella = 0.17; // Altura de cada escalón
      const huella = 0.27;       // Profundidad de cada escalón
      const grosorEscalon = 0.04;
      const numEscalones = Math.ceil(alturaObjetivo / contrahuella);

      // Material Metálico (Gris industrial)
      const matMetal = new THREE.MeshStandardMaterial({
        color: 0x555555,
        metalness: 0.8,
        roughness: 0.2
      });

      for (let i = 0; i < 15; i++) {
        // 1. Crear el escalón (la tabla horizontal)
        const geoEscalon = new THREE.BoxGeometry(anchoEscalon, grosorEscalon, huella);
        const escalon = new THREE.Mesh(geoEscalon, matMetal);
        const posY = i * contrahuella;
        const posZ = i * huella;
        escalon.position.set(0, (i * contrahuella), (i * huella));// Posicionamiento en diagonal (escalonado)

        grupoEscalera.add(escalon);

        if (i % 2 === 0 || i === numEscalones - 1) {
          const geoPoste = new THREE.BoxGeometry(0.04, 0.8, 0.04);
          const poste = new THREE.Mesh(geoPoste, matMetal);

          // Los ubicamos en los extremos del escalón (derecha e izquierda)
          poste.position.set(-anchoEscalon / 2 - 0.05, posY + 0.4, posZ);
          grupoEscalera.add(poste);
        }
      }

      // . Pasamanos (Simple)
      const geoPasamanos = new THREE.BoxGeometry(0.03, 0.08, numEscalones * huella * 1.2);
      const pasamanosDer = new THREE.Mesh(geoPasamanos, matMetal);

      pasamanosDer.position.set(anchoEscalon - 1.5, alturaObjetivo / 2.2, (numEscalones * huella) / 2.2);
      pasamanosDer.rotation.x = Math.PI / 1.22; // Inclinación según la escalera

      grupoEscalera.add(pasamanosDer);

      //Pasamanos superior
      const geoPasamanosSup = new THREE.BoxGeometry(0.03, 0.08, numEscalones * huella * 1.2);
      const PasamanosSup = new THREE.Mesh(geoPasamanosSup, matMetal);

      PasamanosSup.position.set(anchoEscalon - 1.5, alturaObjetivo / 1.3, (numEscalones * huella) / 2.2);
      PasamanosSup.rotation.x = Math.PI / 1.22; // Inclinación según la escalera

      grupoEscalera.add(PasamanosSup);

      grupoEscalera.position.set(x, 0.33, z);
      grupoEscalera.rotation.y = roty;
      setShadows(grupoEscalera);
      escena.add(grupoEscalera);
      return grupoEscalera;
    }

    function renderizadoSoportesMasivos(puntos) {
      const cantidad = puntos.length;
      // Creamos una malla instanciada: (geometría, material, cantidad)
      const instancedMesh = new THREE.InstancedMesh(geoSoportePostal, matMetalSoporte, cantidad);
      const dummy = new THREE.Object3D(); // Objeto auxiliar para calcular matrices

      puntos.forEach((p, i) => {
        // Configuramos la posición del soporte temporal
        dummy.position.set(p.x, p.y, p.z);
        dummy.rotation.y = p.roty || 0;
        dummy.updateMatrix(); // Genera la matriz de transformación

        // Asignamos la matriz a la instancia i
        instancedMesh.setMatrixAt(i, dummy.matrix);
      });

      instancedMesh.instanceMatrix.needsUpdate = true;
      instancedMesh.castShadow = true;
      instancedMesh.receiveShadow = true;

      escena.add(instancedMesh);
      return instancedMesh;
    }

    function SoportesMasivosHoriz(puntos) {
      // La geometría base es de tamaño 1 para que la escala sea exacta
      const geoBase = new THREE.BoxGeometry(0.05, 1, 0.05);
      const cantidad = puntos.length;

      const instancedMesh = new THREE.InstancedMesh(geoBase, matMetalSoporte, cantidad);

        dummy.position.set(p.x, p.y, p.z);

        // 2. Rotación (Acostados)
        dummy.rotation.z = Math.PI / 2;
        dummy.rotation.y = p.roty || 0;

        // Como la geometría mide 1, si p.Largo es 0.9, se escalará a 0.9m
        const largoIndividual = p.Largo || 0.9;
        dummy.scale.set(1, largoIndividual, 1);

        dummy.updateMatrix();
        instancedMesh.setMatrixAt(i, dummy.matrix);
      });

      instancedMesh.instanceMatrix.needsUpdate = true;
      instancedMesh.castShadow = true;
      instancedMesh.receiveShadow = true;

      escena.add(instancedMesh);
      return instancedMesh;
    }

    // --- Función para crear un panel de reja ---
    function crearPanelReja(x, y, z, ANCHO_REJA, roty = 0) {
      const panel = new THREE.Group();
      const ALTO_REJA = 2.5;
      const GROSOR_MARCO = 0.05;

      const matMetal = new THREE.MeshStandardMaterial({
        color: 0xcccccc,
        metalness: 0.8,
        roughness: 0.2,
      });

      // 1. MARCO (Cajas reales)
      const marcoGeoVert = new THREE.BoxGeometry(GROSOR_MARCO, ALTO_REJA, GROSOR_MARCO);
      const marcoGeoHoriz = new THREE.BoxGeometry(ANCHO_REJA, GROSOR_MARCO, GROSOR_MARCO);

      const mIzq = new THREE.Mesh(marcoGeoVert, matMetal);
      mIzq.position.set(-ANCHO_REJA / 2, ALTO_REJA / 2, 0);

      const mDer = mIzq.clone();
      mDer.position.x = ANCHO_REJA / 2;

      const mSup = new THREE.Mesh(marcoGeoHoriz, matMetal);
      mSup.position.set(0, ALTO_REJA, 0);

      const mInf = mSup.clone();
      mInf.position.y = 0;

      panel.add(mIzq, mDer, mSup, mInf);

      // 2. REJILLA (Malla eficiente)
      // Creamos un plano y le aplicamos una repetición de patrón de rejilla
      const loader = new THREE.TextureLoader();
      // Puedes usar una imagen de rejilla o crear una cuadrícula simple con Canvas
      const canvas = document.createElement('canvas');
      canvas.width = 64;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.strokeStyle = '#888888';
      ctx.lineWidth = 4;
      ctx.strokeRect(0, 0, 64, 64);

      const texReja = new THREE.CanvasTexture(canvas);
      texReja.wrapS = texReja.wrapT = THREE.RepeatWrapping;
      texReja.repeat.set(ANCHO_REJA * 10, ALTO_REJA * 10); // Densidad de la malla

      const matReja = new THREE.MeshStandardMaterial({
        map: texReja,
        transparent: true,
        side: THREE.DoubleSide,
        metalness: 0.5
      });

      const mallaInterior = new THREE.Mesh(new THREE.PlaneGeometry(ANCHO_REJA, ALTO_REJA), matReja);
      mallaInterior.position.set(0, ALTO_REJA / 2, 0);
      panel.add(mallaInterior);

      // 3. POSICIONAMIENTO FINAL
      panel.position.set(x, y, z);
      panel.rotation.y = roty;

      escena.add(panel);
      return panel;
    }

    function pared_blanca(ancho, alto, x, y, z, rotation, Prof = 0.2, vAncho = 0, vAlto = 0, vOffsetX = 0, vOffsetY = 0,) {
      // Si no hay ventana, pared simple
      if (vAncho === 0 || vAlto === 0) {
        const m = new THREE.Mesh(
          new THREE.BoxGeometry(ancho, alto, Prof),
          matBlancoFondo,
        );
        m.position.set(x, y, z);
        m.rotation.y = rotation;
        m.receiveShadow = true;
        m.castShadow = true;
        escena.add(m);
        return m;
      }

      // Con hueco
      const grupo = new THREE.Group();

      function bl(w, h, px, py) {
        const m = new THREE.Mesh(
          new THREE.BoxGeometry(w, h, Prof),
          matBlancoFondo,
        );
        m.position.set(px, py, 0);
        m.receiveShadow = true;
        m.castShadow = true;
        grupo.add(m);
      }

      const anchoIzq = ancho / 2 + vOffsetX - vAncho / 2;
      const anchoDer = ancho / 2 - vOffsetX - vAncho / 2;
      const altoSup = alto / 2 - vOffsetY - vAlto / 2;
      const altoInf = alto / 2 + vOffsetY - vAlto / 2;

      if (anchoIzq > 0) bl(anchoIzq, alto, -(ancho / 2 - anchoIzq / 2), 0);
      if (anchoDer > 0) bl(anchoDer, alto, ancho / 2 - anchoDer / 2, 0);
      if (altoSup > 0) bl(vAncho, altoSup, vOffsetX, alto / 2 - altoSup / 2);
      if (altoInf > 0) bl(vAncho, altoInf, vOffsetX, -alto / 2 + altoInf / 2);

      grupo.position.set(x, y, z);
      grupo.rotation.y = rotation;
      escena.add(grupo);
      return grupo;
    }

    function crearPanelVentanasPro(x, y, z, anchoTotal, columnas, alturasFilas, rotY = 0,) {
      const grupoPanel = new THREE.Group();
      const grosorMarco = 0.04;
      const grosorVidrio = 0.05;

      // Calculamos el alto total sumando las alturas de las filas + los marcos
      const altoTotal =
        alturasFilas.reduce((a, b) => a + b, 0) +
        grosorMarco * (alturasFilas.length + 1);
      const anchoVidrio =
        (anchoTotal - grosorMarco * (columnas + 1)) / columnas;

      // 1. MARCOS HORIZONTALES
      let alturaAcumulada = -altoTotal / 2;

      // Marco base
      const marcoBase = new THREE.Mesh(
        new THREE.BoxGeometry(anchoTotal, grosorMarco, grosorMarco),
        matMarcoAluminio,
      );
      marcoBase.position.y = alturaAcumulada + grosorMarco / 2;
      grupoPanel.add(marcoBase);

      alturasFilas.forEach((altoFila, index) => {
        // 2. VIDRIOS Y MARCOS VERTICALES DE ESTA FILA
        for (let c = 0; c < columnas; c++) {
          // Vidrio
          const vidrio = new THREE.Mesh(
            new THREE.BoxGeometry(anchoVidrio, altoFila, grosorVidrio),
            matVidrioPanel,
          );
          vidrio.position.x =
            -anchoTotal / 2 +
            (anchoVidrio / 2 + grosorMarco) +
            c * (anchoVidrio + grosorMarco);
          vidrio.position.y = alturaAcumulada + grosorMarco + altoFila / 2;
          grupoPanel.add(vidrio);
        }

        // Parales verticales para esta sección de altura
        for (let j = 0; j <= columnas; j++) {
          const barraV = new THREE.Mesh(
            new THREE.BoxGeometry(grosorMarco, altoFila, grosorMarco),
            matMarcoAluminio,
          );
          barraV.position.x =
            -anchoTotal / 2 +
            j * (anchoVidrio + grosorMarco) +
            grosorMarco / 2;
          barraV.position.y = alturaAcumulada + grosorMarco + altoFila / 2;
          grupoPanel.add(barraV);
        }

        // 3. SIGUIENTE MARCO HORIZONTAL (Divisor)
        alturaAcumulada += altoFila + grosorMarco;
        const marcoDivisor = new THREE.Mesh(
          new THREE.BoxGeometry(anchoTotal, grosorMarco, grosorMarco),
          matMarcoAluminio,
        );
        marcoDivisor.position.y = alturaAcumulada + grosorMarco / 2;
        grupoPanel.add(marcoDivisor);
      });

      // Posicionamiento final
      grupoPanel.position.set(x, y, z);
      grupoPanel.rotation.y = rotY;

      escena.add(grupoPanel);
      return grupoPanel;
    }

    function crearCajaOcupada(x, y, z) {

    const _BW = 2.6, _BH = 1.2, _BD = 1.7;
    let _canastillaGeos = null;

    function crearGeometriasCanastilla() {
      if (_canastillaGeos) return _canastillaGeos;
      const groups = { main: [], dark: [], mid: [], rim: [], label: [], void: [] };
      const hw = _BW / 2, hh = _BH / 2, hd = _BD / 2;
      const T = 0.055, TT = T * 0.8;

      function addBox(w, h, d, x, y, z, key) {
        const geo = new THREE.BoxGeometry(w, h, d);
        geo.translate(x, y, z);
        groups[key].push(geo);
      }

      // 1. PISO
      for (let i = 0; i < 6; i++) {
        addBox(_BW - T * 4, T * 1.1, _BD / 6 * 0.62, 0, -hh + T * 0.55, -hd + _BD / 6 * (i + 0.5), 'dark');
      }
      for (let i = 0; i < 5; i++) {
        addBox(T * 0.9, T * 0.9, _BD - T * 4, -hw + T * 2 + (_BW - T * 4) / 4 * i, -hh + T * 0.55, 0, 'dark');
      }
      // 2. POSTES ESQUINEROS
      [[-1, -1], [1, -1], [-1, 1], [1, 1]].forEach(([sx, sz]) => {
        addBox(T * 2.8, _BH, T * 2.8, sx * (hw - T * 1.4), 0, sz * (hd - T * 1.4), 'main');
      });
      // 3. BANDAS HORIZONTALES
      const bands = [-hh + T * 0.9, -hh + _BH * 0.42, hh - T * 2.4];
      bands.forEach(by => {
        const bh = T * 2.0;
        addBox(_BW - T * 5.5, bh, T, 0, by, -hd + T * 0.5, 'mid');
        addBox(_BW - T * 5.5, bh, T, 0, by, hd - T * 0.5, 'dark');
        addBox(T, bh, _BD - T * 5.5, -hw + T * 0.5, by, 0, 'dark');
        addBox(T, bh, _BD - T * 5.5, hw - T * 0.5, by, 0, 'main');
      });
      // 4. BARRAS VERTICALES frente/atrás
      const barH = _BH - T * 3.5;
      const barY = -hh + T * 1.8 + barH / 2;
      for (let i = 0; i < 10; i++) {
        const x = -hw + T * 2.8 + (_BW - T * 5.6) / 9 * i;
        addBox(TT, barH, TT, x, barY, -hd + T * 0.5, 'mid');
        addBox(TT, barH, TT, x, barY, hd - T * 0.5, 'dark');
      }
      for (let i = 0; i < 3; i++) {
        const y = -hh + T * 2.5 + (barH - T * 2) / 3 * (i + 0.5);
        addBox(_BW - T * 5.5, TT, TT, 0, y, -hd + T * 0.5, 'mid');
        addBox(_BW - T * 5.5, TT, TT, 0, y, hd - T * 0.5, 'dark');
      }
      // 5. BARRAS VERTICALES laterales
      for (let i = 0; i < 6; i++) {
        const z = -hd + T * 2.8 + (_BD - T * 5.6) / 5 * i;
        addBox(TT, barH, TT, -hw + T * 0.5, barY, z, 'dark');
        addBox(TT, barH, TT, hw - T * 0.5, barY, z, 'main');
      }
      for (let i = 0; i < 3; i++) {
        const y = -hh + T * 2.5 + (barH - T * 2) / 3 * (i + 0.5);
        addBox(TT, TT, _BD - T * 5.5, -hw + T * 0.5, y, 0, 'dark');
        addBox(TT, TT, _BD - T * 5.5, hw - T * 0.5, y, 0, 'main');
      }
      // 6. COLUMNA CENTRAL
      addBox(T * 1.8, _BH, T, 0, 0, -hd + T * 0.5, 'main');
      addBox(T * 1.8, _BH, T, 0, 0, hd - T * 0.5, 'dark');
      addBox(T, _BH, T * 1.8, -hw + T * 0.5, 0, 0, 'dark');
      addBox(T, _BH, T * 1.8, hw - T * 0.5, 0, 0, 'main');
      // 7. RIM SUPERIOR
      const rimH = T * 2.2, rimThk = T * 2.0;
      addBox(_BW, rimH, rimThk, 0, hh - rimH / 2, -hd + rimThk / 2, 'rim');
      addBox(_BW, rimH, rimThk, 0, hh - rimH / 2, hd - rimThk / 2, 'rim');
      addBox(rimThk, rimH, _BD, -hw + rimThk / 2, hh - rimH / 2, 0, 'rim');
      addBox(rimThk, rimH, _BD, hw - rimThk / 2, hh - rimH / 2, 0, 'rim');
      // 8. MANIJAS
      const hndW = T * 3.0, hndH = _BH * 0.30, hndD = _BD * 0.26;
      const hndY = hh - hndH / 2 - T * 1.8;
      addBox(hndW, hndH, hndD, -hw - hndW / 2 + T * 0.5, hndY, 0, 'main');
      addBox(hndW * 0.5, hndH * 0.50, hndD * 0.88, -hw - hndW * 0.08, hndY + hndH * 0.04, 0, 'void');
      addBox(hndW, hndH, hndD, hw + hndW / 2 - T * 0.5, hndY, 0, 'main');
      addBox(hndW * 0.5, hndH * 0.50, hndD * 0.88, hw + hndW * 0.08, hndY + hndH * 0.04, 0, 'void');
      // 9. REFUERZOS ESQUINA
      [[-1, -1], [1, -1], [-1, 1], [1, 1]].forEach(([sx, sz]) => {
        addBox(T * 0.9, _BH * 0.82, T * 2.0, sx * (hw + T * 0.3), -hh + _BH * 0.41, sz * (hd - T * 3.5), 'dark');
      });
      // 10. ETIQUETA
      addBox(_BW * 0.34, _BH * 0.22, T * 0.5, _BW * 0.11, -hh + _BH * 0.34, -hd - T * 0.12, 'label');

      const result = {};
      for (const key of Object.keys(groups)) {
        result[key] = mergeGeometries(groups[key], false);
        groups[key].forEach(g => g.dispose());
      }
      _canastillaGeos = result;
      return result;
    }

    function crearCanastilla(color) {
      const g = new THREE.Group();
      const geos = crearGeometriasCanastilla();
      const base = new THREE.Color(color);
      function mat(col, rough) { return new THREE.MeshStandardMaterial({ color: col, roughness: rough || 0.72, metalness: 0.03, side: THREE.DoubleSide }); }
      [
        { key: 'main', color: base, rough: 0.72 },
        { key: 'dark', color: base.clone().multiplyScalar(0.70), rough: 0.80 },
        { key: 'mid', color: base.clone().multiplyScalar(0.84), rough: 0.75 },
        { key: 'rim', color: base.clone().multiplyScalar(1.06), rough: 0.62 },
        { key: 'label', color: base.clone().multiplyScalar(0.58), rough: 0.85 },
        { key: 'void', color: 0x0a120a, rough: 1.0 },
      ].forEach(({ key, color, rough }) => {
        const mesh = new THREE.Mesh(geos[key], mat(color, rough));
        mesh.castShadow = true; mesh.receiveShadow = true;
        g.add(mesh);
      });
      g.scale.set(0.48 / _BW, 0.48 / _BW, 0.48 / _BW);
      return g;
    }

    function generarBodegaEstibas(
      geometria,

    ) {

      const mesh = new THREE.InstancedMesh(
        geometria,
        material,
        puntos.length

      puntos.forEach((p, i) => {

          dummy.position.set(
            p.x_mundo,
            p.y,
            p.z + p.x
          );
          dummy.rotation.y =
            Math.PI / 2;
        } else {
          dummy.position.set(
            p.x,
            p.y,
            p.z
          );
          dummy.rotation.y = 0;
        }
        dummy.updateMatrix();

        // MATRIZ DE LA INSTANCIA
        mesh.setMatrixAt(
          i,
          dummy.matrix
        );

        // GUARDAR DATOS DE LA ESTIBA
        mapaEstibas.set(i, {
          id: p.id,
          x: p.x,
          y: p.y,
          z: p.z,
          rotado: p.rotado,
          x_mundo: p.x_mundo
        });
      });
      mesh.instanceMatrix.needsUpdate = true;
      return mesh;
    }

      const campos = [
        '#input',
        '#inputSerial',
        '#inputNombre',
        '#Categorias_Art',
        '#Categorias_Ubic'
      ];

      campos.forEach(campo => {
        // NO LIMPIAR EL ACTIVO
        if (campo !== activo) {
          // INPUTS
          if ($(campo).is('input')) {
            $(campo).val('');

          // SELECTS
          if ($(campo).is('select')) {

    // ─── MOSTRAR RESULTADOS EN MODAL ───
    function mostrarEnModal(datos, titulo) {
      const tabla = document.querySelector("table");
      tabla.innerHTML = "";

      if (!datos || datos.length === 0) {
        tabla.innerHTML = `<tr><td style="text-align:center; padding:2em; color:#999;">${titulo || "Sin resultados"}</td></tr>`;
        modal.style.display = "flex";
        return;
      }

      // --- CABECERA ---
      const thead = document.createElement("thead");
      const headerRow = document.createElement("tr");
      const headers = ["Id", "Tipologia", "Codigo", "Fecha/Hora", "Nombre", "Ubicacion", "IMG", "Cantidad", "Serial", "Costo Unitario", "Costo Total"];
      headers.forEach(g => {
        const th = document.createElement("th");
        th.textContent = g;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      tabla.appendChild(thead);

      // --- CUERPO ---
      const tbody = document.createElement("tbody");

      // --- PIE DE TABLA ---
      // --- CALCULAR TOTAL COSTO ---
      const totalCosto = datos.reduce((acc, fila) => {

        // COLUMNA COSTO = índice 10
        let valor = fila[10];

        // LIMPIAR FORMATO
        valor = String(valor || "0")
          .replace(/\$/g, '')
          .replace(/\./g, '')
          .replace(/,/g, '')
          .trim();

        valor = parseFloat(valor) || 0;

        return acc + valor;

      }, 0);

      // --- PIE DE TABLA ---
      const tfoot = document.createElement("tfoot");
      const tfoottr = document.createElement("tr");
      const tfoottd = document.createElement("td");

      // OCUPAR TODAS LAS COLUMNAS
      tfoottd.colSpan = headers.length;

      tfoottd.innerHTML = `
  <div style="
    display:flex;
    justify-content:flex-end;
    font-size:18px;
    font-weight:bold;

    function setShadows(obj) {
      obj.traverse((child) => {
        if (child.isMesh) {

        }
      });

    // Geometrías compartidas de racks (2.4×5×1)
    const _rackPostGeo = new THREE.BoxGeometry(0.1, 5, 0.1);
    const _rackDiagGeo = new THREE.BoxGeometry(0.02, 0.04, 1.4);
    const _rackBeamGeo = new THREE.BoxGeometry(2.4, 0.15, 0.06);

    function crearFilaRacksInteractiva(width, height, depth, configuracionNiveles) {
      const grupoFila = new THREE.Group();
      const numCuerpos = configuracionNiveles.length;
      const postGeo = _rackPostGeo, diagGeo = _rackDiagGeo, beamGeo = _rackBeamGeo;
      const posts = [], diags = [], beams = [];
      const numDiagonales = Math.floor(height / 1.5);

      for (let i = 0; i <= numCuerpos; i++) {
        const x = i * width;
        posts.push({ x, y: height / 2, z: -depth / 2 });
        posts.push({ x, y: height / 2, z: depth / 2 });
        for (let j = 0; j < numDiagonales; j++) {
          diags.push({ x, y: j * 1.5 + 0.75, z: 0, rx: j % 2 === 0 ? Math.PI / 4 : -Math.PI / 4 });
        }
      }

      configuracionNiveles.forEach((nivelesDelCuerpo, index) => {
        const xCentro = index * width + width / 2;
        nivelesDelCuerpo.forEach((alturaNivel) => {
          beams.push({ x: xCentro, y: alturaNivel, z: depth / 2 });
          beams.push({ x: xCentro, y: alturaNivel, z: -depth / 2 });
        });
      });

      const dummy = new THREE.Object3D();
      function addInstanced(geo, mat, transforms) {
        const mesh = new THREE.InstancedMesh(geo, mat, transforms.length);
        transforms.forEach((t, i) => {
          dummy.position.set(t.x, t.y, t.z);
          dummy.rotation.set(t.rx || 0, t.ry || 0, t.rz || 0);
          dummy.updateMatrix();
          mesh.setMatrixAt(i, dummy.matrix);
        });
        mesh.instanceMatrix.needsUpdate = true;
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        grupoFila.add(mesh);
      }

      addInstanced(postGeo, matPosteAzul, posts);
      addInstanced(diagGeo, matPosteAzul, diags);
      addInstanced(beamGeo, matVigaNaranja, beams);

      return grupoFila;
    }

    //colubnas pared1
    colubnas(28.5, 3.2, -0.1, 0);
    colubnas(25, 3.2, -0.1, 0);
    colubnas(20, 3.2, -0.1, 0);
    colubnas(15, 3.2, -0.1, 0);
    colubnas(10, 3.2, -0.1, 0);
    colubnas(5, 3.2, -0.1, 0);
    colubnas(1, 3.2, -0.1, 0);
    //colubnas pared2
    colubnas(21.8, 3.2, -23.8, 0);
    colubnas(18.2, 3.2, -23.8, 0);
    colubnas(15.4, 3.2, -23.8, 0);
    colubnas(12.2, 3.2, -23.8, 0);

    // ESC: 1 vez cierra modal/sidebar, 3 veces también quita remarcados
    let escCount = 0;
    let escTimer = null;
    window.addEventListener('keydown', function (event) {
      if (event.key === "Escape") {
        modal.style.display = "none";
        cerrarSidebar();
        escCount++;
        if (escCount >= 3) {
          escCount = 0;
          if (mallaResaltadoActual) {
            escena.remove(mallaResaltadoActual);
            mallaResaltadoActual = null;
          }
          if (window.resaltadosCategoria) {
            window.resaltadosCategoria.forEach(malla => escena.remove(malla));
          }
          window.resaltadosCategoria = [];
        }
        clearTimeout(escTimer);
        escTimer = setTimeout(() => { escCount = 0; }, 1000);
      }
    });
    // BTN Control
    window.addEventListener('keydown', function (event) {
      if (event.key === 'Control') {
        console.log("Control");
        camara.position.y -= 0.1;

        estadoFPS.pos.copy(camara.position);
      }
    });

    // BTN shift
    window.addEventListener('keydown', function (event) {
      if (event.key === 'Shift') {
        camara.position.y += 0.1;

        estadoFPS.pos.copy(camara.position);
      }
    });

    // ANIMACION
    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(reloj.getDelta(), 0.05);

      if (modoFPS && controlActivo) {
        const rapidez = 3.0;
        direccion.set(0, 0, 0);
        if (teclas['w']) direccion.z -= 1;
        if (teclas['s']) direccion.z += 1;
        if (teclas['a']) direccion.x -= 1;
        if (teclas['d']) direccion.x += 1;
        if (direccion.length() > 0) {
          direccion.normalize();
          const adelante = new THREE.Vector3();
          camara.getWorldDirection(adelante);
          adelante.y = 0; adelante.normalize();
          const derecha = new THREE.Vector3();
          derecha.crossVectors(adelante, camara.up).normalize();
          const mover = new THREE.Vector3();
          mover.addScaledVector(adelante, -direccion.z * rapidez * delta);
          mover.addScaledVector(derecha, direccion.x * rapidez * delta);
          camara.position.add(mover);
        }
        // Mirar con flechas
        const velAng = 2.0;
        if (teclas['arrowleft']) euler.y += velAng * delta;
        if (teclas['arrowright']) euler.y -= velAng * delta;
        if (teclas['arrowup']) euler.x += velAng * delta;
        if (teclas['arrowdown']) euler.x -= velAng * delta;
        if (teclas['arrowleft'] || teclas['arrowright'] || teclas['arrowup'] || teclas['arrowdown']) {
          euler.x = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, euler.x));
          camara.quaternion.setFromEuler(euler);
        }
      }

      // Adaptativo: desactiva bloom si el FPS es muy bajo
      fpsContador++;
      fpsTiempo += delta;
      if (fpsTiempo > 2) {
        const fps = fpsContador / fpsTiempo;
        if (fps < 25 && bloomActivo) { bloomActivo = false; bloomPass.enabled = false; }
        if (fps > 40 && !bloomActivo) { bloomActivo = true; bloomPass.enabled = true; }
        fpsContador = 0; fpsTiempo = 0;
      }

      // Polvo flotante (cada ~8 frames)
      contadorPolvo++; if (contadorPolvo % 8 === 0) {
        const t = Date.now() * 0.0005;
        const pos = dustParticles.geometry.attributes.position.array;
        for (let i = 0; i < dustCount; i++) {
          pos[i * 3 + 1] = dustBaseY[i] + Math.sin(t + i) * 0.4;
        }
        dustParticles.geometry.attributes.position.needsUpdate = true;
      }
      if (!modoFPS) orbitControls.update();
      composer.render();
    }
    animate();

    window.addEventListener("resize", () => {
      camara.aspect = window.innerWidth / window.innerHeight;
      camara.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    const loader = new GLTFLoader();

    //Extintor
    loader.load(
      "https://raw.githubusercontent.com/practicanteinventarios-design/Bodega3d/main/extintor.glb",

      (gltf) => {

        const extintor = gltf.scene;

        // Posición
        extintor.position.set(5, 10, -3);

        // Escala
        extintor.scale.set(1, 1, 1);

        // Rotación
        extintor.rotation.y = Math.PI / 2;

        escena.add(extintor);
      }
    );

    //montacargas
    loader.load(
      "https://raw.githubusercontent.com/practicanteinventarios-design/Bodega3d/main/montacarga.glb",

      (gltf) => {

        const montacarga = gltf.scene;

        // Posición
        montacarga.position.set(5, 1.5, -3);

        // Escala
        montacarga.scale.set(3, 3, 3);

        // Rotación
        montacarga.rotation.y = Math.PI / 2;

        escena.add(montacarga);
      }
    );

    //camara
    loader.load(
      "https://raw.githubusercontent.com/practicanteinventarios-design/Bodega3d/main/camara.glb",

      (gltf) => {
        const camara = gltf.scene;

        // Posición
        camara.position.set(28.1, 3, -3);
        camara.rotation.y = Math.PI / 2;
        // Escala
        camara.scale.set(0.22, 0.22, 0.22);

        // Rotación
        camara.rotation.y = -Math.PI / 2;

        escena.add(camara);
      }
    );


  </script>
</body>
